# -------------------------------------------------------------------
# 02 Continuous Delivery - runs on manual trigger only
# -------------------------------------------------------------------

.cd_plan_template: &cd_plan_template
  stage: plan
  script:
    - cd "${TF_ROOT}"
    - >
      terraform init
      -backend-config="storage_account_name=${BACKEND_AZURE_STORAGE_ACCOUNT_NAME}"
      -backend-config="container_name=${BACKEND_CONTAINER}"
      -backend-config="key=terraform.tfstate"
      -backend-config="use_azuread_auth=true"
      -backend-config="use_oidc=true"
      -backend-config="client_id=${AZURE_CLIENT_ID}"
      -backend-config="tenant_id=${AZURE_TENANT_ID}"
      -backend-config="subscription_id=${AZURE_SUBSCRIPTION_ID}"
      -backend-config="oidc_token=${GITLAB_OIDC_TOKEN}"
    - >
      terraform plan
      -var-file="${VAR_FILE_PATH}"
      -out=tfplan
      -input=false
    - terraform show tfplan
  artifacts:
    paths:
      - "${TF_ROOT}/tfplan"
      - "${TF_ROOT}/.terraform"
      - "${TF_ROOT}/.terraform.lock.hcl"
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"

.apply_template: &apply_template
  stage: apply
  script:
    - cd "${TF_ROOT}"
    - >
      terraform init
      -backend-config="storage_account_name=${BACKEND_AZURE_STORAGE_ACCOUNT_NAME}"
      -backend-config="container_name=${BACKEND_CONTAINER}"
      -backend-config="key=terraform.tfstate"
      -backend-config="use_azuread_auth=true"
      -backend-config="use_oidc=true"
      -backend-config="client_id=${AZURE_CLIENT_ID}"
      -backend-config="tenant_id=${AZURE_TENANT_ID}"
      -backend-config="subscription_id=${AZURE_SUBSCRIPTION_ID}"
      -backend-config="oidc_token=${GITLAB_OIDC_TOKEN}"
    - terraform apply -input=false -auto-approve tfplan
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: on_success
    - when: never

# --- Plan jobs ---
cd:plan:dev:
  <<: *cd_plan_template
  environment:
    name: dev
    action: prepare
  variables:
    BACKEND_CONTAINER: "dev"
    VAR_FILE_PATH: "./config/dev.tfvars"

cd:plan:test:
  <<: *cd_plan_template
  needs: ["cd:plan:dev"]
  environment:
    name: test
    action: prepare
  variables:
    BACKEND_CONTAINER: "test"
    VAR_FILE_PATH: "./config/test.tfvars"

cd:plan:prod:
  <<: *cd_plan_template
  needs: ["cd:plan:test"]
  environment:
    name: prod
    action: prepare
  variables:
    BACKEND_CONTAINER: "prod"
    VAR_FILE_PATH: "./config/prod.tfvars"

# --- Apply jobs ---
apply:dev:
  <<: *apply_template
  needs: ["cd:plan:dev"]
  environment:
    name: dev
  variables:
    BACKEND_CONTAINER: "dev"
    VAR_FILE_PATH: "./config/dev.tfvars"

apply:test:
  <<: *apply_template
  needs: ["cd:plan:test", "apply:dev"]
  environment:
    name: test
  variables:
    BACKEND_CONTAINER: "test"
    VAR_FILE_PATH: "./config/test.tfvars"

apply:prod:
  <<: *apply_template
  needs: ["cd:plan:prod", "apply:test"]
  environment:
    name: prod
  variables:
    BACKEND_CONTAINER: "prod"
    VAR_FILE_PATH: "./config/prod.tfvars"
  when: manual
