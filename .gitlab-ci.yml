spec:
  inputs:
    environment:
      description: "Choose environment to deploy"
      type: string
      default: "dev"
      options:
        - "dev"
        - "test"
        - "prod"
        - "all"
---

include:
  - local: '.gitlab/ci/dev.yml'
  - local: '.gitlab/ci/test.yml'
  - local: '.gitlab/ci/prod.yml'

variables:
  TF_ROOT: "."
  BACKEND_AZURE_STORAGE_ACCOUNT_NAME: "stodemgmgtwus2001rqp"
  AZURE_SUBSCRIPTION_ID: "f775e0e1-c710-47ae-9dee-f50a0e4a0c70"
  AZURE_TENANT_ID: "873cfe26-04bd-4643-aba6-82b72b38bf4f"
  ENVIRONMENT: $[[ inputs.environment ]]

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"

default:
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - export ARM_CLIENT_ID="${AZURE_CLIENT_ID}"
    - export ARM_SUBSCRIPTION_ID="${AZURE_SUBSCRIPTION_ID}"
    - export ARM_TENANT_ID="${AZURE_TENANT_ID}"
    - export ARM_USE_OIDC=true
    - export ARM_USE_AZUREAD=true
    - export ARM_USE_CLI=false
    - export ARM_OIDC_TOKEN="${GITLAB_OIDC_TOKEN}"

stages:
  - validate
  - plan
  - apply
